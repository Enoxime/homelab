---
apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: local-path-provisioner
  namespace: local-path-storage
spec:
  interval: 1440m
  url: https://github.com/rancher/local-path-provisioner
  ref:
    tag: v0.0.36
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: local-path-provisioner
  namespace: local-path-storage
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: local-path-provisioner
  path: ./deploy
  prune: true
  wait: true
  patches:
    - patch: |-
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: local-path-config
          namespace: local-path-storage
        data:
          config.json: |-
            {
                    "nodePathMap":[
                    {
                            "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
                            "paths":["/var/mnt/local-path-provisioner"]
                    }
                    ]
            }
      target:
        kind: ConfigMap
        name: local-path-config
    - patch: |-
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: local-path
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
      target:
        kind: StorageClass
        name: local-path
