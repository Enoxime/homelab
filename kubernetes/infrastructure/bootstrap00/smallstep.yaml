---
apiVersion: v1
kind: Namespace
metadata:
  name: smallstep
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: smallstep
  namespace: smallstep
spec:
  interval: 1440m
  url: https://smallstep.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: step-certificates
  namespace: smallstep
spec:
  # dependsOn:
  #   - name: kube-prometheus-stack
  #     namespace: monitoring
  interval: 5m
  chart:
    spec:
      chart: step-certificates
      version: ">=1.19.4 <1.20.0"
      sourceRef:
        kind: HelmRepository
        name: smallstep
        namespace: smallstep
      interval: 1m
  values:
    inject:
      enabled: true
      # Config contains the configuration files ca.json and defaults.json
      config:
        files:
          ca.json:
            root: /home/step/certs/root_ca.crt
            federateRoots: []
            crt: /home/step/certs/intermediate_ca.crt
            key: /home/step/secrets/intermediate_ca_key
            address: :443
            dnsNames:
              - "ca.${mgmtDomain}"
              - "ca.${mgmtDomainOld}"
              - "ca.${serviceDomain}"
              - "ca.${serviceDomainOld}"
              - step-certificates.smallstep.svc.cluster.local
            logger:
              format: json
            db:
              type: badgerv2
              dataSource: /home/step/db
            authority:
              enableAdmin: false
              claims:
                maxTLSCertDuration: 720h
              provisioners:
                - type: "JWK"
                  name: "admin@${mainDomain}"
                  key:
                    use: "sig"
                    kty: "EC"
                    kid: "${stepCa_kid}"
                    crv: "P-256"
                    alg: "ES256"
                    x: "${stepCa_x}"
                    y: "${stepCa_y}"
                  encryptedKey: "eyJhbGciOiJQQkVTMi1IUzI1NitBMTI4S1ciLCJjdHkiOiJqd2sranNvbiIsImVuYyI6IkEyNTZHQ00iLCJwMmMiOjYwMDAwMCwicDJzIjoiemZ0NTBabzJmeWNrZk5TYW1Ibm9qdyJ9.6nym_4zosDnCkFzLjMmBUAPPdVXmQejg2a3XgaRJvfUTD5-j-oXo4w.56Q7GoiOU9X4kOTY.Jz4amXuCkJl7PWghNnvYt4m3KQkpsFvnQsnxIio1K2d49h8FDeXnmkSF3Xq8eMzsJ9kz_Fen7DzO2gR4FBdwItZU_oqaXb3uaozEPoyyVZIOf83KXuozDBjCAcEtCSmDfYMuVZQtDP2n_8WhhYyHOFn8TPY2NR5bZX5JmRdRuzBR1mA8mI1vRabMAhL2fNlXJb9fX6B8Yi9KJ8ezPtDYvS_joPoFU-jyUbpHBgnEIkHUp63QGx3fETUfFN4BabDHGag0It77CUYXpQaln1CktkHxV95aRacQHY68vC3fhA7RkIRVjWG3KLiVrAB3fA5xMIQi8SVJ6VfGAmGkjjc.imF-TXh0f9YudftJ6ZkS8A"
                  options:
                    x509: {}
                    ssh: {}
                - type: "ACME"
                  name: "acme"
            tls:
              cipherSuites:
                - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
                - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
              minVersion: 1.2
              maxVersion: 1.3
              renegotiation: false

          defaults.json:
            ca-url: "https://ca.${mgmtDomainOld}"
            ca-config: /home/step/config/ca.json
            fingerprint: ba796b5752c9481ce8d321ce8cc74e5f6af1e08b9d611384d236b94c2264594e
            root: /home/step/certs/root_ca.crt

      # Certificates contains the root and intermediate certificate and
      # optionally the SSH host and user public keys
      certificates:
        # intermediate_ca contains the text of the intermediate CA Certificate
        intermediate_ca: |
          -----BEGIN CERTIFICATE-----
          MIIBxTCCAWugAwIBAgIRANpZI2cKRtwSvtE4mCzAs6AwCgYIKoZIzj0EAwIwLDEQ
          MA4GA1UEChMHaG9tZWxhYjEYMBYGA1UEAxMPaG9tZWxhYiBSb290IENBMB4XDTI2
          MDUyNjIyMzQ0MloXDTM2MDUyMzIyMzQ0MlowNDEQMA4GA1UEChMHaG9tZWxhYjEg
          MB4GA1UEAxMXaG9tZWxhYiBJbnRlcm1lZGlhdGUgQ0EwWTATBgcqhkjOPQIBBggq
          hkjOPQMBBwNCAAT3IsIisbUqJSAwC/HVMyu9dVAs+yLaGox079Ik6xzJw8Xi2+l/
          IRP9cZmgXfKOxAAsHIoyvgUuJhG61abfEWCWo2YwZDAOBgNVHQ8BAf8EBAMCAQYw
          EgYDVR0TAQH/BAgwBgEB/wIBADAdBgNVHQ4EFgQUNDFM7LvZ341asQbny5VmZHvS
          LwgwHwYDVR0jBBgwFoAU/etZ5dLtVZo6ctys8gVEsKAS/zIwCgYIKoZIzj0EAwID
          SAAwRQIgH3W4kcNzYAVKvanzbztv+/bRuz5IMGgCUAAxSPhoaEkCIQCeHRcC5r3K
          zzM6AMv6ZZwIa9hdCJbdHgFDn6Afv19QNQ==
          -----END CERTIFICATE-----


        # root_ca contains the text of the root CA Certificate
        root_ca: |
          -----BEGIN CERTIFICATE-----
          MIIBnDCCAUKgAwIBAgIRAOfz3+TlZ3WTQ43ObleUzAowCgYIKoZIzj0EAwIwLDEQ
          MA4GA1UEChMHaG9tZWxhYjEYMBYGA1UEAxMPaG9tZWxhYiBSb290IENBMB4XDTI2
          MDUyNjIyMzQ0MVoXDTM2MDUyMzIyMzQ0MVowLDEQMA4GA1UEChMHaG9tZWxhYjEY
          MBYGA1UEAxMPaG9tZWxhYiBSb290IENBMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcD
          QgAENnoL4mqp3vVYlSDMfQVfn3BkTMN89eh9x3L093PoU4jiGxN4hyEHAVSqm9mJ
          aEoSZKLXBTdFcIaT4wsb45mgJ6NFMEMwDgYDVR0PAQH/BAQDAgEGMBIGA1UdEwEB
          /wQIMAYBAf8CAQEwHQYDVR0OBBYEFP3rWeXS7VWaOnLcrPIFRLCgEv8yMAoGCCqG
          SM49BAMCA0gAMEUCIQC1SGliEizpUSMp81AzBJdF+enYQYFfRM4lYLS4kJInSQIg
          BqH4ARHETeI+tm4N0k+EN1E9E4CKRDnikmyr6va8RHg=
          -----END CERTIFICATE-----


      # Secrets contains the root and intermediate keys and optionally the SSH
      # private keys
      secrets:
        # ca_password contains the password used to encrypt x509.intermediate_ca_key, ssh.host_ca_key and ssh.user_ca_key
        # This value must be base64 encoded.
        ca_password: "${stepCa_password}"
        provisioner_password: "${stepCa_password}"

        x509:
          # intermediate_ca_key contains the contents of your encrypted intermediate CA key
          intermediate_ca_key: |
            -----BEGIN EC PRIVATE KEY-----
            Proc-Type: 4,ENCRYPTED
            DEK-Info: AES-256-CBC,4e35ec66b93dd86bead7eb4acf2ef938

            K1Z+ZEWEMUuQTX+uP0fF0z+yL5gEjbV6OZGQ/1jOgbs4/MaZ2DObkrkfr61hfNTZ
            vnvKQAxxcnLvXrdIzJ/Bgtr/k9lTXvDuRkOgHqzit7cZgjLCtNwmBKYtX3Iw3nuT
            n8leKpTqOzx0dfCgIIZklL8RwilunsWHIT8Dgr9QbOI=
            -----END EC PRIVATE KEY-----


          # root_ca_key contains the contents of your encrypted root CA key
          # Note that this value can be omitted without impacting the functionality of step-certificates
          # If supplied, this should be encrypted using a unique password that is not used for encrypting
          # the intermediate_ca_key, ssh.host_ca_key or ssh.user_ca_key.
          root_ca_key: |
            -----BEGIN EC PRIVATE KEY-----
            Proc-Type: 4,ENCRYPTED
            DEK-Info: AES-256-CBC,b649a05cb72c9bb77f41d77eeab07837

            xHBxH8ZpgGorDkysR85uyRkVOGFBwaNyEB3yiK8Z/++lfQEOudp99EhjKeNXrY7B
            u4xohSyEMG4LNKowQjat0X0ompS5VPHePVWNJL7vOycO2up3533SvM88YUQyyUUv
            UgoBzHbs1VHP2a4mnWqoEydscRXEQj5DWEskHomNrdg=
