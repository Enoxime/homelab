---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: "service-bootstrap-ipv4-64514"
      localASN: 64514
      peers:
        - name: "opnsense-service-bootstrap"
          peerASN: 64512
          peerAddress: "${ipv4_mgmt_router}"
          peerConfigRef:
            name: "cilium-peer"
    - name: "service-bootstrap-ipv6-64514"
      localASN: 64514
      peers:
        - name: "opnsense-service-bootstrap"
          peerASN: 64512
          peerAddress: "${ipv6_mgmt_router}"
          peerConfigRef:
            name: "cilium-peer"
