---
apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: service-pool-mgmt
spec:
  allowFirstLastIPs: "No"
  blocks:
    - cidr: ${ipv4_mgmt_bgp_cidr}
    - cidr: ${ipv6_mgmt_bgp_cidr}
  disabled: false
  serviceSelector:
    matchLabels:
      network: mgmt
---
