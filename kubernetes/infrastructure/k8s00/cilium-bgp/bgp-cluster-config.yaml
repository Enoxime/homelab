---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: "service-k8s00-ipv4-64513"
      localASN: 64513
      peers:
        - name: "opnsense-service-k8s00"
          peerASN: 64512
          peerAddress: "${ipv4_k8s00_router}"
          peerConfigRef:
            name: "cilium-peer"
