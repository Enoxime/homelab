---
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-gpu
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia
  namespace: nvidia-gpu
spec:
  interval: 1440m
  url: https://helm.ngc.nvidia.com/nvidia
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: nvidia-gpu
spec:
  interval: 1440m
  chart:
    spec:
      chart: gpu-operator
      version: ">= 26.3.1 < 26.4.0"
      sourceRef:
        kind: HelmRepository
        name: nvidia
      interval: 60m
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    hostPaths:
      driverInstallDir: /usr/local
    cdi:
      enabled: true
    dcgmExporter:
      enabled: true
      service:
        internalTrafficPolicy: Cluster
    devicePlugin:
      enabled: true
      config:
        name: device-plugin-config
        create: true
        default: default
        data:
          default: |-
            version: v1
            flags:
              migStrategy: "none"
              failOnInitError: true
            sharing:
              timeSlicing:
                resources:
                  - name: nvidia.com/gpu
                    replicas: 10
    nfd:
      enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dra-driver-gpu
  namespace: nvidia-gpu
spec:
  interval: 1440m
  chart:
    spec:
      chart: nvidia-dra-driver-gpu
      version: ">= 25.12.0 < 25.13.0"
      sourceRef:
        kind: HelmRepository
        name: nvidia
      interval: 60m
  values:
    nvidiaDriverRoot: /usr/local
    gpuResourcesEnabledOverride: true
    resources:
      gpus:
        enabled: true
      computeDomains:
        enabled: false
