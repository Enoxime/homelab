apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: cilium
    repo: https://helm.cilium.io/
    releaseName: cilium
    namespace: kube-system
    version: 1.19.4
    valuesInline:
      ipam:
        mode: kubernetes
        operator:
          clusterPoolIPv4MaskSize: 24
          clusterPoolIPv4PodCIDRList:
            - 10.244.0.0/16
          clusterPoolIPv6MaskSize: 120
          clusterPoolIPv6PodCIDRList:
            - fc00::/48
      kubeProxyReplacement: true
      securityContext:
        capabilities:
          ciliumAgent:
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUID
          cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE
      cgroup:
        autoMount:
          enabled: false
        hostRoot: /sys/fs/cgroup
      k8sServiceHost: localhost
      k8sServicePort: 7445
      cni:
        exclusive: false
      gatewayAPI:
        enabled: true
        enableAlpn: true
        enableAppProtocol: true
      devices: br0
      ipv4:
        enabled: true
      ipv6:
        enabled: true
