clusterName: bootstrap00
endpoint: https://cp00.${subdomain}:6443
kubernetesVersion: "1.35.5"
talosVersion: v1.13.0
nodes:
  - hostname: cp00.${subdomain}
    ipAddress: cp00.${subdomain}
    controlPlane: true
    installDisk: /dev/nvme0n1
cniConfig:
  name: none
clusterPodNets:
  - fc00::/48
  - 10.244.0.0/16
clusterSvcNets:
  - fc00:0:1::/112
  - 10.96.0.0/12
patches:
  - |-
    cluster:
      proxy:
        disabled: true
      discovery:
        enabled: false
        registries:
          service:
            disabled: false
      controllerManager:
        extraArgs:
          # For prometheus
          bind-address: [::]
      scheduler:
        extraArgs:
          # For prometheus
          bind-address: [::]
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: true
        nodeIP:
          validSubnets:
            - "${ipv6_cidr}"
            - "${cidr}"
controlPlane:
  patches:
    - |-
      cluster:
        apiServer:
          admissionControl:
            - name: PodSecurity
              configuration:
                exemptions:
                  namespaces:
                    - admin
                    - database
                    - flux-system
                    - monitoring
                    - rook-ceph
    - |-
      cluster:
        etcd:
          extraArgs:
            # for prometheus
            listen-metrics-urls: http://[::]:2381
          advertisedSubnets:
            - "${ipv6_cidr}"
            - "${cidr}"
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
    - |-
      machine:
        nodeLabels:
          node.kubernetes.io/exclude-from-external-load-balancers:
            $$patch: delete
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/i915
          - siderolabs/intel-ucode
  networkInterfaces:
      - interface: eno1
        dhcp: false
      - interface: br0
        # routes:
        #   - network: 0.0.0.0/0
        #     gateway: "${gateway}"
        #   - network: ::/0
        #     gateway: "${ipv6_gateway}"
        bridge:
          interfaces:
            - eno1
          stp:
            enabled: true
          # vlan:
          #   vlanFiltering: true
        dhcp: true
        dhcpOptions:
          ipv4: true
          ipv6: true
