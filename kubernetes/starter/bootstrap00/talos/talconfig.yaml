clusterName: bootstrap00
endpoint: https://cp00.${subdomain}:6443
kubernetesVersion: "1.35.5"
talosVersion: v1.13.0
nodes:
  - hostname: cp00.${subdomain}
    ipAddress: cp00.${subdomain}
    controlPlane: true
    installDisk: /dev/nvme0n1
    volumes:
      - name: EPHEMERAL
        provisioning:
          diskSelector:
            match: disk.transport == "nvme"
          maxSize: 76GiB
    userVolumes:
      - name: local-path-provisioner
        provisioning:
          diskSelector:
            match: disk.transport == "nvme"
          maxSize: 50GiB
        filesystem:
          type: xfs
cniConfig:
  name: none
clusterPodNets:
  - fc00::/48
  - 10.244.0.0/16
clusterSvcNets:
  - fc00:0:1::/112
  - 10.96.0.0/12
patches:
  - |-
    cluster:
      proxy:
        disabled: true
      discovery:
        enabled: false
        registries:
          service:
            disabled: false
      controllerManager:
        extraArgs:
          # For prometheus
          bind-address: "::"
      scheduler:
        extraArgs:
          # For prometheus
          bind-address: "::"
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: true
        nodeIP:
          validSubnets:
            - "${ipv6_cidr}"
            - "${cidr}"
  - "@./homelab_root_ca.yaml"
controlPlane:
  patches:
    - |-
      cluster:
        apiServer:
          admissionControl:
            - name: PodSecurity
              configuration:
                exemptions:
                  namespaces:
                    - admin
                    - flux-system
                    - monitoring
                    - local-path-storage
    - |-
      cluster:
        etcd:
          extraArgs:
            # for prometheus
            listen-metrics-urls: http://[::]:2381
          advertisedSubnets:
            - "${ipv6_cidr}"
            - "${cidr}"
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
    - |-
      machine:
        nodeLabels:
          node.kubernetes.io/exclude-from-external-load-balancers:
            $$patch: delete
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/i915
          - siderolabs/intel-ucode
  networkInterfaces:
      - interface: eno1
        dhcp: false
      - interface: br0
        bridge:
          interfaces:
            - eno1
          stp:
            enabled: true
          vlan:
            vlanFiltering: true
        dhcp: true
        dhcpOptions:
          ipv4: true
          ipv6: true
        vlans:
          - vlanId: 30
            addresses:
              - "${serviceIpv4}"
              - "${serviceIpv6}"
            routes:
              - network: "${serviceCidrIpv4}"
                gateway: "${serviceGatewayIpv4}"
              - network: "${serviceCidrIpv6}"
                gateway: "${serviceGatewayIpv6}"
          - vlanId: 40
            addresses:
              - "${k8s00Ipv4}"
              - "${k8s00Ipv6}"
            routes:
              - network: "${k8s00CidrIpv4}"
                gateway: "${k8s00GatewayIpv4}"
              - network: "${k8s00CidrIpv6}"
                gateway: "${k8s00GatewayIpv6}"
  nameservers:
    # - 2606:4700:4700::1111
    # - 2606:4700:4700::1001
    - ${mgmtIpv6Dns}
    - ${mgmtIpv4Dns}
