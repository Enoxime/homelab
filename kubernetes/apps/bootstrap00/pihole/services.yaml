---
apiVersion: v1
kind: Service
metadata:
  name: pihole-mgmt
  namespace: pihole
  labels:
    app: pihole-mgmt
    network: mgmt
  annotations:
    lbipam.cilium.io/ips: "${piholeIpv4MgmtBootstrap00},${piholeIpv6MgmtBootstrap00}"
    lbipam.cilium.io/sharing-key: mgmt-pihole
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  ports:
    - name: dns
      port: 53
      protocol: TCP
      targetPort: dns
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
  type: LoadBalancer
  loadBalancerClass: io.cilium/bgp-control-plane
  # loadBalancerClass: io.cilium/l2-announcer
  selector:
    app: pihole
    release: pihole-mgmt
