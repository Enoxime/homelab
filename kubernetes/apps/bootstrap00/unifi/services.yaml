---
apiVersion: v1
kind: Service
metadata:
  name: unifi
  namespace: bootstrap
  labels:
    app: unifi-network-application
spec:
  ipFamilyPolicy: PreferDualStack
  ports:
    - name: device-comm
      port: 8080
      targetPort: 8080
    - name: admin-https
      port: 8443
      targetPort: 8443
    - name: admin-http
      port: 8880
      targetPort: 8880
  selector:
    app: unifi-network-application
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-discovery-stun-mgmt
  namespace: bootstrap
  labels:
    app: unifi-network-application
    network: mgmt
  annotations:
    lbipam.cilium.io/ips: "${bootstrapMgmtIpv4},${bootstrapMgmtIpv6}"
    lbipam.cilium.io/sharing-key: mgmt-bootstrap
spec:
  ipFamilyPolicy: PreferDualStack
  ports:
    - name: discovery
      port: 10001
      protocol: UDP
      targetPort: 10001
    - name: discovery-l2
      port: 1900
      protocol: UDP
      targetPort: 1900
    - name: stun
      port: 3478
      protocol: UDP
      targetPort: 3478
    - name: device-comm
      port: 8080
      targetPort: 8080
    - name: admin-https
      port: 8443
      protocol: TCP
      targetPort: 8443
  type: LoadBalancer
  selector:
    app: unifi-network-application
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: bootstrap
  labels:
    app: mongodb
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
  selector:
    app: mongodb
