---
apiVersion: v1
kind: Service
metadata:
  name: ca-mgmt
  namespace: smallstep
  labels:
    app: ca
    network: mgmt
  annotations:
    lbipam.cilium.io/ips: "${caMgmtIpv4},${caMgmtIpv6}"
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  ports:
    - name: ca-server
      port: 443
      protocol: TCP
      targetPort: 9000
  type: LoadBalancer
  loadBalancerClass: io.cilium/l2-announcer
  selector:
    app.kubernetes.io/instance: step-certificates
    app.kubernetes.io/name: step-certificates
---
