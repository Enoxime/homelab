---
apiVersion: v1
kind: Service
metadata:
  name: netbootxyz
  namespace: bootstrap
  labels:
    app: netbootxyz
spec:
  ipFamilyPolicy: PreferDualStack
  ports:
    - name: assets
      port: 80
      targetPort: 80
    - name: admin
      port: 3000
      targetPort: 3000
  clusterIP: None
  selector:
    app: netbootxyz
---
apiVersion: v1
kind: Service
metadata:
  name: netbootxyz-mgmt
  namespace: bootstrap
  labels:
    app: netbootxyz
    network: mgmt
  annotations:
    lbipam.cilium.io/ips: "${bootstrapMgmtIpv4},${bootstrapMgmtIpv6}"
    lbipam.cilium.io/sharing-key: mgmt-bootstrap
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  ports:
    - name: tftp
      port: 69
      protocol: UDP
      targetPort: 69
    - name: assets
      port: 80
      targetPort: 80
    - name: admin
      port: 3000
      targetPort: 3000
  type: LoadBalancer
  loadBalancerClass: io.cilium/l2-announcer
  selector:
    app: netbootxyz
